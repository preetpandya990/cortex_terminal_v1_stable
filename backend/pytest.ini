[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Production-grade test configuration
addopts =
    --strict-markers
    --strict-config
    --tb=short
    --maxfail=5
    --timeout=300
    -ra
    --color=yes

markers =
    unit: Pure unit tests with no I/O
    integration: Tests that hit the test DB
    api: API contract tests via HTTP client
    slow: Tests that take >1s to run
    performance: Performance and load tests

# Timeout settings
timeout = 300
timeout_method = thread

# Warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:torch
    ignore::UserWarning:sqlalchemy
