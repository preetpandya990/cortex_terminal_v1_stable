# Cortex AI — Ruff Configuration
# =================================
# Ruff replaces: flake8, isort, pyupgrade, pep8-naming, and black formatting.
# Run: ruff check . --fix && ruff format .

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["app", "tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "DTZ", # flake8-datetimez — catches datetime.utcnow() usage
    "T20", # flake8-print — catches stray print() statements
    "SIM", # flake8-simplify
    "RUF", # Ruff-specific rules
]
ignore = [
    "E501",   # line too long — handled by formatter
    "B008",   # do not perform function calls in default arguments (FastAPI Depends pattern)
    "RUF012", # mutable class attributes — SQLAlchemy patterns need this
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"